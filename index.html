<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RunTrack</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div class="container">
        
        <header>
            <h1>🏃‍♀️ RunTrack</h1>
            <button id="btnTema" title="Alternar tema">🌙</button>
        </header>

        <!-- Resumo -->
        <section class="resumo">
            <div class="card-resumo">
                <span class="card-icone">📅</span>
                <p class="card-valor" id="totalCorridas">0</p>
                <p class="card-rotulo">Corridas</p>
            </div>
            <div class="card-resumo">
                <span class="card-icone">📏</span>
                <p class="card-valor" id="totalDistancia">0</p>
                <p class="card-rotulo">Km total</p>
            </div>
            <div class="card-resumo">
                <span class="card-icone">⚡</span>
                <p class="card-valor" id="melhorPace">--</p>
                <p class="card-rotulo">Melhor pace</p>
            </div>
            <div class="card-resumo">
                <span class="card-icone">⏱️</span>
                <p class="card-valor" id="tempoTotal">0h</p>
                <p class="card-rotulo">Tempo total</p>
            </div>
        </section>

        <!-- Gráfico -->
        <section class="grafico-section">
            <h2>📈 Evolução</h2>
            <div class="grafico-container">
                <canvas id="graficoDistancia"></canvas>
            </div>
        </section>

        <!-- Formulário -->
        <section class="formulario">
            <h2>Registrar Corrida</h2>
            
            <div class="linha">
                <div class="campo">
                    <label for="data">Data</label>
                    <input type="date" id="data">
                </div>
                <div class="campo">
                    <label for="distancia">Distância (km)</label>
                    <input type="number" id="distancia" placeholder="5.0" step="0.1" min="0.1">
                </div>
            </div>

            <div class="linha tres-cols">
                <div class="campo">
                    <label for="horas">Horas</label>
                    <input type="number" id="horas" placeholder="0" min="0" value="0">
                </div>
                <div class="campo">
                    <label for="minutos">Minutos</label>
                    <input type="number" id="minutos" placeholder="30" min="0" max="59" value="30">
                </div>
                <div class="campo">
                    <label for="segundos">Segundos</label>
                    <input type="number" id="segundos" placeholder="0" min="0" max="59" value="0">
                </div>
            </div>

            <button type="button" id="btnSalvar">💾 Registrar Corrida</button>
            <button type="button" id="btnCancelar" class="btn-cancelar" style="display: none;">Cancelar Edição</button>
            <input type="hidden" id="editandoId" value="">
        </section>

        <!-- Histórico -->
        <section class="historico">
            <h2>📋 Histórico</h2>
            <div id="listaCorridas">
                <p class="vazio">Nenhuma corrida registrada. Que tal sair pra correr? 🏃‍♀️</p>
            </div>
        </section>

    </div>

    <script src="app.js"></script>
</body>
</html>
